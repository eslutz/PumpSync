name: iOS CI

on:
  push:
    branches:
      - main
    paths:
      - "PumpSync/**"
      - "PumpSyncTests/**"
      - "PumpSyncUITests/**"
      - "project.yml"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "PumpSync/**"
      - "PumpSyncTests/**"
      - "PumpSyncUITests/**"
      - "project.yml"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

jobs:
  ios:
    name: Generate, build, and test iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Create simulator
        id: simulator
        run: |
          set -euo pipefail
          runtime="$(xcrun simctl list runtimes available --json | python3 -c '
          import json, re, sys
          runtimes = [
              runtime for runtime in json.load(sys.stdin)["runtimes"]
              if runtime.get("isAvailable") and runtime.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS-")
          ]
          if not runtimes:
              raise SystemExit("No available iOS simulator runtimes found")
          runtimes.sort(key=lambda runtime: [int(part) for part in re.findall(r"\\d+", runtime.get("version", ""))])
          print(runtimes[-1]["identifier"])
          ')"
          device_type="$(xcrun simctl list devicetypes --json | python3 -c '
          import json, sys
          device_types = json.load(sys.stdin)["devicetypes"]
          by_identifier = {device_type["identifier"]: device_type for device_type in device_types}
          preferred = [
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro",
          ]
          for identifier in preferred:
              if identifier in by_identifier:
                  print(identifier)
                  break
          else:
              for device_type in device_types:
                  if "iPhone" in device_type.get("name", ""):
                      print(device_type["identifier"])
                      break
              else:
                  raise SystemExit("No iPhone simulator device types found")
          ')"
          device_id="$(xcrun simctl create PumpSync-CI "$device_type" "$runtime")"
          xcrun simctl boot "$device_id" || true
          xcrun simctl bootstatus "$device_id" -b
          echo "destination=id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project PumpSync.xcodeproj \
            -scheme PumpSync \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath .DerivedData

      - name: Test
        run: |
          xcodebuild test-without-building \
            -project PumpSync.xcodeproj \
            -scheme PumpSync \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath .DerivedData
