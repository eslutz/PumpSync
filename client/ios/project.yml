name: PumpSync
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
targets:
  PumpSync:
    type: application
    platform: iOS
    sources:
      - path: PumpSync/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericslutz.PumpSync
        INFOPLIST_FILE: PumpSync/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PumpSync/PumpSync.entitlements
    info:
      path: PumpSync/Resources/Info.plist
      properties:
        API_BASE_URL: https://localhost:7071
        BGTaskSchedulerPermittedIdentifiers:
          - com.ericslutz.PumpSync.daily-sync
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: PumpSync
        CFBundleExecutable: PumpSync
        CFBundleIdentifier: com.ericslutz.PumpSync
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: PumpSync
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        NSHealthShareUsageDescription: PumpSync checks authorization status for insulin and carbohydrate samples before syncing Tandem data.
        NSHealthUpdateUsageDescription: PumpSync writes Tandem insulin and carbohydrate samples to Apple Health after you start a sync.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - processing
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: PumpSync/PumpSync.entitlements
  PumpSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PumpSyncTests
    dependencies:
      - target: PumpSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericslutz.PumpSyncTests
  PumpSyncUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PumpSyncUITests
    dependencies:
      - target: PumpSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericslutz.PumpSyncUITests
