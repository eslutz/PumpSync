name: PumpSync
options:
  minimumXcodeGenVersion: 2.40.0
  defaultConfig: Debug
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
configs:
  Debug: debug
  Beta: release
  Release: release
schemes:
  PumpSync:
    build:
      targets:
        PumpSync: all
        PumpSyncTests: [test]
        PumpSyncUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      debugEnabled: false
      targets:
        - PumpSyncTests
        - PumpSyncUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PumpSync Beta:
    build:
      targets:
        PumpSync: all
    run:
      config: Beta
    profile:
      config: Beta
    analyze:
      config: Beta
    archive:
      config: Beta
targets:
  PumpSync:
    type: application
    platform: iOS
    sources:
      - path: PumpSync/Sources
      - path: PumpSync/Resources
        excludes:
          - Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.PumpSync
        INFOPLIST_FILE: PumpSync/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PumpSync/PumpSync.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QS3GC3CT43
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          API_BASE_URL: https://func-pumpsync-nonprod-flex-api.azurewebsites.net/api
        Beta:
          API_BASE_URL: https://func-pumpsync-nonprod-flex-api.azurewebsites.net/api
        Release:
          API_BASE_URL: https://func-pumpsync-prod-flex-api.azurewebsites.net/api
    info:
      path: PumpSync/Resources/Info.plist
      properties:
        API_BASE_URL: "$(API_BASE_URL)"
        HOSTED_SUBSCRIPTION_GROUP_ID: "22168040"
        HOSTED_SUBSCRIPTION_PRODUCT_ID: dev.ericslutz.PumpSync.hosted.monthly
        ITSAppUsesNonExemptEncryption: false
        BGTaskSchedulerPermittedIdentifiers:
          - dev.ericslutz.PumpSync.daily-sync
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: PumpSync
        CFBundleExecutable: PumpSync
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: PumpSync
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        NSHealthShareUsageDescription: PumpSync checks authorization status for insulin and carbohydrate samples before syncing Tandem data.
        NSHealthUpdateUsageDescription: PumpSync writes Tandem insulin and carbohydrate samples to Apple Health after you start a sync.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - processing
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: PumpSync/PumpSync.entitlements
      properties:
        com.apple.developer.healthkit: true
  PumpSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PumpSyncTests
    dependencies:
      - target: PumpSync
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.PumpSyncTests
  PumpSyncUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PumpSyncUITests
    dependencies:
      - target: PumpSync
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.PumpSyncUITests
